name: Prepare Pre-Release

on:
  workflow_dispatch:

jobs:
  build:
    if: github.repository_owner == 'pnp'
    name: "Prepares the pre-release"
    runs-on: windows-latest

    permissions:
      contents: write
      packages: read
      pull-requests: write
    
    steps:
      - name: Checkout vscode-viva
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Run update package version script
        run: .\scripts\update-package-version.ps1 -PathToWorkspace "${{ github.workspace }}"
        shell: pwsh
        continue-on-error: false

      - name: Verification - Install the dependencies
        run: npm install --omit=optional

      - name: Verification - Build
        run: npm run vscode:prepublish

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b prepare-pre-release
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "prepares pre-release"
          git push origin prepare-pre-release --force
        shell: pwsh
        
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $prBody = @"
          ## 🎯 Aim
          
          The aim of this PR is to prepare the pre-release of the extension by updating the version number in the package.json file.

          ## ⚠️ Warning - Do review the changes before merging

          Be sure to have a look at the changes before merging. Merge it to `dev` branch.
          "@
          
          gh pr create --title "Pre-Release preparation" --body $prBody --base dev --head prepare-pre-release || gh pr edit prepare-pre-release --body $prBody
        shell: pwsh
